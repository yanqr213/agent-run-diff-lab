name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke CLI
        run: agent-run-diff-lab examples/baseline.json examples/baseline.json --config examples/agent-run-diff-lab.config.json --format json
      - name: Smoke CI-native reports
        run: |
          mkdir -p reports
          agent-run-diff-lab examples/baseline.json examples/candidate.json --config examples/agent-run-diff-lab.config.json --format sarif --output reports/agent-run-diff.sarif || test $? -eq 1
          python -m json.tool reports/agent-run-diff.sarif > /dev/null
          agent-run-diff-lab examples/baseline.json examples/candidate.json --config examples/agent-run-diff-lab.config.json --format pr-comment --output reports/agent-run-diff-comment.md || test $? -eq 1
          grep "agent-run-diff-lab:pr-comment" reports/agent-run-diff-comment.md
